name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-policy:
    name: Linting et Policy as Code
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Linting YAML (yamllint)
        run: |
          sudo apt-get update && sudo apt-get install -y yamllint
          yamllint k8s/deployment.yaml .github/workflows/ci.yml

      - name: Vérification des politiques K8s (Conftest)
        uses: instrumenta/conftest-action@master
        with:
          files: k8s/deployment.yaml
          policy: policy/deny_root.rego

  security-sca:
    name: Scan des dépendances (Trivy FS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Scan SCA (requirements.txt)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0' # Mis à 0 pour ne pas bloquer le pipeline immédiatement afin de voir les logs, mettez '1' pour bloquer
          severity: 'HIGH,CRITICAL'

  build-and-scan-image:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest
    # Dépend des jobs précédents pour ne build que si le code est propre
    needs: [lint-and-policy, security-sca] 
    steps:
      - uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t mon-image-flask:${{ github.sha }} .

      - name: Scan de l'image (Trivy Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'mon-image-flask:${{ github.sha }}'
          format: 'table'
          exit-code: '0' # Mis à 0 pour observer les résultats dans ce projet d'étude
          severity: 'HIGH,CRITICAL'
